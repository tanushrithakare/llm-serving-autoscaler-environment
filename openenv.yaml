name: sentinel-soc
version: "1.0.0"
description: >
  Expert Security Incident Analyzer environment. An agent acts as a SOC Analyst 
  triaging and resolving cyber-security threats across logs, code, and network traces.

entry_point:
  host: "0.0.0.0"
  port: 7860

endpoints:
  reset:
    method: POST
    path: /reset
    params:
      task:
        type: string
        enum: [easy, medium, hard]
        default: easy

  step:
    method: POST
    path: /step
    body: IncidentAction

  state:
    method: GET
    path: /state

  health:
    method: GET
    path: /health

  grade:
    method: POST
    path: /grade

tasks:
  - name: easy
    description: Detect and mitigate a production secret key leak in logs.
    difficulty: easy
    max_steps: 10
  
  - name: medium
    description: Identify a SQL Injection vulnerability exploited by an external attacker.
    difficulty: medium
    max_steps: 15
  
  - name: hard
    description: Detect and remove a malicious backdoor planted in a vendor dependency.
    difficulty: hard
    max_steps: 20

observation_space:
  type: object
  fields:
    logs: { type: string }
    code_snippet: { type: string }
    incident_thread: { type: string }
    status: { type: string }
    steps_remaining: { type: int }
    reward_signal: { type: float }

action_space:
  type: object
  fields:
    reasoning: { type: string }
    tool: { type: string }
    parameters: { type: string }

reward_range: [-1.0, 1.0]

grading:
  score_range: [0.01, 0.99]
